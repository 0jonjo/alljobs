# Kamal deploy configuration
# https://kamal-deploy.org

service: alljobs
image: your-dockerhub-user/alljobs

servers:
  web:
    - 192.168.0.1  # replace with your server IP

proxy:
  ssl: true
  host: api.alljobs.example.com  # replace with your domain

registry:
  username: your-dockerhub-user  # replace with your Docker Hub username
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  clear:
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "true"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL

volumes:
  - "alljobs_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
